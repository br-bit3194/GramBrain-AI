version: '3.8'

services:
  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: grambrain-backend
    ports:
      - "8000:8000"
    environment:
      - AWS_REGION=us-east-1
      - LOG_LEVEL=INFO
      - AGENT_TIMEOUT=10
    volumes:
      - ./backend:/app
    command: python main.py
    networks:
      - grambrain-network
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Service (when created)
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: grambrain-frontend
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - NEXT_PUBLIC_API_URL=http://backend:8000/api/v1
  #   volumes:
  #     - ./frontend:/app
  #   networks:
  #     - grambrain-network
  #   depends_on:
  #     - backend

  # Redis Cache (optional)
  redis:
    image: redis:7-alpine
    container_name: grambrain-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - grambrain-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL Database (optional, for future use)
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: grambrain-postgres
  #   environment:
  #     - POSTGRES_DB=grambrain
  #     - POSTGRES_USER=grambrain
  #     - POSTGRES_PASSWORD=grambrain_password
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   networks:
  #     - grambrain-network
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U grambrain"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  redis-data:
  # postgres-data:

networks:
  grambrain-network:
    driver: bridge
